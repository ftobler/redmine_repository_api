name: Integration Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        redmine: ['5', '6.1', '6', 'latest']

    name: Redmine ${{ matrix.redmine }}

    env:
      REDMINE_VERSION: ${{ matrix.redmine }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      # Free parallelism — Python installs while Redmine migrates
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: pip install -r test/requirements.txt

      - name: Wait for Redmine to be ready
        run: python test/wait_docker_ready.py

      - name: Bootstrap Redmine
        run: python test/bootstrap.py

      - name: Run tests
        run: pytest test/ -v -s -W ignore::urllib3.exceptions.InsecureRequestWarning

      - name: Dump docker logs
        if: always()
        run: docker compose logs
